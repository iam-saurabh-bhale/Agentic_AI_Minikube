apiVersion: v1
kind: Secret
metadata:
  name: agentic-ai-secrets
  namespace: default
  labels:
    app: agentic-ai
type: Opaque
# IMPORTANT: Replace the placeholder below with your actual OpenAI API key
# before applying this manifest.
#
# Alternatively (recommended), let the deploy.sh script create the secret
# from the OPENAI_API_KEY environment variable – in that case you do NOT
# apply this file manually.
stringData:
  openai-api-key: "REPLACE_WITH_YOUR_OPENAI_API_KEY"
