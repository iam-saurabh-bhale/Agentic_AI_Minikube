apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-ai-config
  namespace: default
  labels:
    app: agentic-ai
data:
  # Path inside the container where the Stock Market PDF is expected.
  # The PDF is bundled with the Docker image under /app/Agents/.
  pdf-path: "/app/Agents/Stock_Market_Performance_2024.pdf"

  # Directory where ChromaDB stores its embedded vectors.
  chroma-persist-dir: "/app/chroma_db"
