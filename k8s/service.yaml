apiVersion: v1
kind: Service
metadata:
  name: agentic-ai-service
  namespace: default
  labels:
    app: agentic-ai
spec:
  type: NodePort
  selector:
    app: agentic-ai
  ports:
    - name: http
      protocol: TCP
      port: 80          # Service port (inside the cluster)
      targetPort: 8000  # Container port
      nodePort: 30800   # External port on the Minikube node (30000–32767)
